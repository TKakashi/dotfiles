# ┌──────────────────────────────────────────┐
# │  Конфигурация Hyprland                    │
# │  Комментарии на русском для понимания     │
# └──────────────────────────────────────────┘

# ─── Переменные окружения ────────────────────
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = GDK_BACKEND,wayland,x11
env = MOZ_ENABLE_WAYLAND,1

# ─── Мониторы ────────────────────────────────
# Настройте под своё разрешение и частоту
monitor=,preferred,auto,1

# ─── Автозапуск ──────────────────────────────
exec-once = waybar
exec-once = dunst
exec-once = hyprpaper
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = nm-applet --indicator
exec-once = blueman-applet

# ─── Внешний вид и поведение окон ────────────
general {
    gaps_in = 6
    gaps_out = 12
    border_size = 2
    col.active_border = rgba(89b4faff)  # лавандовый
    col.inactive_border = rgba(585b70ee)
    layout = dwindle
    no_border_on_floating = false
}

decoration {
    rounding = 12
    blur {
        enabled = true
        size = 5
        passes = 2
        new_optimizations = on
    }
    drop_shadow = yes
    shadow_range = 10
    shadow_render_power = 2
    col.shadow = rgba(1a1a1aee)
}

# Анимации
animations {
    enabled = yes
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# ─── Управление окнами ────────────────────────
input {
    kb_layout = us,ru
    kb_options = grp:alt_shift_toggle,caps:escape
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = yes
    }
}

misc {
    disable_hyprland_logo = true
    force_default_wallpaper = 0
}

# ─── Клавиатурные сокращения ──────────────────
# Основные
bind = SUPER, Return, exec, kitty
bind = SUPER, Q, killactive
bind = SUPER, M, exit
bind = SUPER, E, exec, wlogout
bind = SUPER, V, togglefloating
bind = SUPER, F, fullscreen
bind = SUPER, P, pseudo, # dwindle
bind = SUPER, Space, exec, wofi --show drun

# Скриншоты
bind = , Print, exec, ~/.local/bin/screenshot.sh

# Звук и яркость
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86MonBrightnessUp, exec, brightnessctl s +10%
bind = , XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Блокировка экрана
bind = SUPER, L, exec, swaylock

# Переключение рабочих столов
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

# Перемещение окон между рабочими столами
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

# Прокрутка рабочих столов
bind = SUPER, mouse_down, workspace, e+1
bind = SUPER, mouse_up, workspace, e-1

# ─── Правила для окон (примеры) ──────────────
windowrulev2 = float, class:(pavucontrol)
windowrulev2 = size 800 600, class:(pavucontrol)
