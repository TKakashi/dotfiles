# ─── Базовые настройки терминала kitty ─────
font_family      Hack Nerd Font
font_size 12
bold_font        auto
italic_font      auto
bold_italic_font auto

# Отключаем рамки окна
hide_window_decorations yes
window_padding_width 8

# Тема (Catppuccin Mocha) – цвета заданы прямо здесь
foreground #cdd6f4
background #1e1e2e
selection_foreground #1e1e2e
selection_background #cba6f7

# Чёрный
color0 #45475a
color8 #585b70

# Красный
color1 #f38ba8
color9 #f38ba8

# Зелёный
color2  #a6e3a1
color10 #a6e3a1

# Жёлтый
color3  #f9e2af
color11 #f9e2af

# Синий
color4  #89b4fa
color12 #89b4fa

# Фиолетовый
color5  #cba6f7
color13 #cba6f7

# Бирюзовый
color6  #94e2d5
color14 #94e2d5

# Белый
color7  #bac2de
color15 #a6adc8

# Прозрачность и размытие
background_opacity 0.9
# Если композитор поддерживает размытие, раскомментируйте:
# background_blur 1

# Курсор
cursor #f5e0dc
cursor_text_color #1e1e2e

# Дополнительно
confirm_os_window_close 0
